version: 2

project_name: mcp2cli

before:
  hooks:
    - go test ./...

builds:
  - id: mcp2cli
    main: ./cmd/mcp2cli/main.go
    binary: mcp2cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

release:
  github:
    owner: hengyunabc
    name: mcp2cli

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true
